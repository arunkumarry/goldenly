services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goldenly_development
      POSTGRES_USER: goldenly
      POSTGRES_PASSWORD: goldenly
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goldenly -d goldenly_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8026:8025"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: bash ./bin/docker-entrypoint-dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://goldenly:goldenly@db:5432/goldenly_development
      RAILS_ENV: development
    volumes:
      - .:/rails
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started

volumes:
  postgres_data:
